# =============================================================
# Keep Render free-tier service warm
#
# Render の無料 Web Service は 15 分アクセスが無いとスリープする。
# 採用担当が初めて URL を開いた際の 10 秒待ち（コールドスタート）を回避するため、
# GitHub Actions の cron で 14 分毎に / を ping して常時起動状態を維持する。
#
# - GitHub の cron は分単位の精度が保証されない（数分遅れる場合あり）ので
#   余裕を持って 14 分間隔とし、Render の 15 分スリープより速い
# - 公開リポジトリの Actions は無料、月の制限内で十分間に合う
# - 60 日間 push が無いと GitHub がスケジュール無効化する点だけ注意
# =============================================================
name: Keep warm

on:
  schedule:
    # 毎時 :00 :10 :20 :30 :40 :50 の 6 回。GitHub Actions の cron は
    # 5〜30 分遅延することが想定挙動とされているため、固定スロット 10 分間隔にして
    # 遅延ありでも Render の 15 分スリープを跨がない確率を最大化する。
    - cron: "0,10,20,30,40,50 * * * *"
  workflow_dispatch:    # 手動でも実行できる

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping live site
        run: |
          set -e
          URL="https://portfolio-cms-cjr4.onrender.com/"
          echo "Pinging $URL"
          # -L: redirects, --max-time 30: cold-start も許容
          status=$(curl -s -o /dev/null -L --max-time 30 -w "%{http_code}" "$URL")
          echo "HTTP $status"
          # 200 か 301/302 のみ成功扱い
          [[ "$status" =~ ^(200|301|302)$ ]]
