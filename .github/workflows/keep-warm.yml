# =============================================================
# Keep Render free-tier service warm
#
# Render の無料 Web Service は 15 分アクセスが無いとスリープする。
# 採用担当が初めて URL を開いた際の 10 秒待ち（コールドスタート）を回避するため、
# GitHub Actions の cron で 14 分毎に / を ping して常時起動状態を維持する。
#
# - GitHub の cron は分単位の精度が保証されない（数分遅れる場合あり）ので
#   余裕を持って 14 分間隔とし、Render の 15 分スリープより速い
# - 公開リポジトリの Actions は無料、月の制限内で十分間に合う
# - 60 日間 push が無いと GitHub がスケジュール無効化する点だけ注意
# =============================================================
name: Keep warm

on:
  schedule:
    # 毎時 :00 :10 :20 :30 :40 :50 の 6 回。GitHub Actions の cron は
    # 5〜30 分遅延することが想定挙動とされているため、固定スロット 10 分間隔にして
    # 遅延ありでも Render の 15 分スリープを跨がない確率を最大化する。
    - cron: "0,10,20,30,40,50 * * * *"
  workflow_dispatch:    # 手動でも実行できる

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping live site
        run: |
          set -e
          URL="https://portfolio-cms-cjr4.onrender.com/"
          echo "Pinging $URL"
          # Render 無料枠のコールドスタートは数十秒かかるため、せっかちに失敗しない設定にする:
          #   --max-time 90        : 1 回あたり最大 90 秒待つ（コールドスタート起床を許容）
          #   --retry 3            : スリープ復帰中の 5xx / 接続エラーを最大 3 回リトライ
          #   --retry-delay 15     : リトライ間隔 15 秒（起動を待つ）
          #   --retry-all-errors   : タイムアウト含むあらゆるエラーでリトライ
          #   --retry-connrefused  : 接続拒否（起動直後）でもリトライ
          #   --retry-max-time 300 : リトライ総時間の上限（job timeout 内に収める）
          status=$(curl -s -o /dev/null -L \
            --max-time 90 \
            --retry 3 --retry-delay 15 --retry-all-errors --retry-connrefused \
            --retry-max-time 300 \
            -w "%{http_code}" "$URL")
          echo "HTTP $status"
          # 200 か 301/302 のみ成功扱い。ここまでリトライしても落ちる場合は
          # 「本当にサイトが落ちている」可能性が高く、失敗通知として有用。
          [[ "$status" =~ ^(200|301|302)$ ]]
