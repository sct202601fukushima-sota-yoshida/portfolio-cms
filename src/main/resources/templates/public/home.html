<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments :: head('Portfolio')}"></head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<main class="site-main">
    <section class="hero">
        <div class="container">
            <h1>自己紹介<em class="accent">.</em><br>ポートフォリオ</h1>
            <p class="lead">Claude Code と協働して、動くものを先に作り、必要な知識を逆算で学ぶ。<br>
                その実例として、本サイト自体を Spring Boot 製の CMS として一人で構築・運用しています。</p>
            <p class="hero__meta">φ = 1.6180339887...  &nbsp;·&nbsp;  built with vibe coding</p>
        </div>

        <!-- Blueprint diagram (2026 trend: Blueprint Design × 黄金比) -->
        <svg class="hero-blueprint" viewBox="0 0 200 138" aria-hidden="true"
             preserveAspectRatio="xMaxYMid meet">
            <!-- Outer golden rectangle: 161.8 × 100 -->
            <g class="bp-shapes">
                <rect x="22" y="20" width="161.8" height="100"/>
                <!-- Vertical divider creating: square (left, 100×100) + golden rect (right, 61.8×100) -->
                <line x1="122" y1="20" x2="122" y2="120"/>
                <!-- Horizontal divider in small golden rect: square top (61.8×61.8) + smaller golden rect -->
                <line x1="122" y1="81.8" x2="183.8" y2="81.8"/>
                <!-- Recursive: vertical divider creating square (right, 38.2×38.2) + smaller golden rect (left, 23.6×38.2)
                     正方形は螺旋が前のステップで終了した角 (183.8, 81.8) を含む側に来る必要があるため右側に配置 -->
                <line x1="145.6" y1="81.8" x2="145.6" y2="120"/>
                <!-- Golden spiral fragment: arc inside top square -->
                <path d="M 22 120 A 100 100 0 0 1 122 20" class="bp-spiral"/>
                <path d="M 122 20 A 61.8 61.8 0 0 1 183.8 81.8" class="bp-spiral"/>
                <path d="M 183.8 81.8 A 38.2 38.2 0 0 1 145.6 120" class="bp-spiral"/>
            </g>
            <!-- Dimension lines (blueprint convention) -->
            <g class="bp-dims">
                <!-- Bottom: total width 1.618 -->
                <line x1="22" y1="128" x2="183.8" y2="128"/>
                <line x1="22" y1="125" x2="22" y2="131"/>
                <line x1="183.8" y1="125" x2="183.8" y2="131"/>
                <!-- Right: total height 1.000 -->
                <line x1="191" y1="20" x2="191" y2="120"/>
                <line x1="188" y1="20" x2="194" y2="20"/>
                <line x1="188" y1="120" x2="194" y2="120"/>
            </g>
            <!-- Labels -->
            <g class="bp-labels">
                <text x="102.9" y="136" text-anchor="middle">a · φ = 1.618</text>
                <text x="195" y="73" text-anchor="middle"
                      transform="rotate(90 195 73)">a = 1.000</text>
                <text x="72" y="74" text-anchor="middle" class="bp-label-inner">a</text>
                <text x="152.9" y="55" text-anchor="middle" class="bp-label-inner">a/φ</text>
                <text x="22" y="14" class="bp-title">FIG. φ — golden subdivision</text>
            </g>
        </svg>
    </section>

    <div class="container">
        <p th:if="${#lists.isEmpty(slides)}" class="empty-state">
            まだ公開スライドがありません。管理画面から追加してください。
        </p>

        <th:block th:each="slide, slideStat : ${slides}">
            <header class="category-divider"
                    th:if="${slideStat.first or slides[slideStat.index - 1].category.id != slide.category.id}">
                <span class="category-divider__index"
                      th:text="${#numbers.formatInteger(slide.category.sortOrder + 1, 2)}">01</span>
                <span class="category-divider__name" th:text="${slide.category.name}">カテゴリ</span>
                <span class="category-divider__rule"></span>
            </header>

            <section class="slide-card">
                <h2 th:text="${slide.title}">タイトル</h2>
                <div class="slide-images" th:if="${not #lists.isEmpty(slide.images)}">
                    <picture th:each="img, imgStat : ${slide.images}">
                        <!-- WebP は seed 済みの .jpg ファイルにのみ用意 -->
                        <source th:if="${#strings.endsWith(img.fileName, '.jpg')}"
                                th:srcset="@{'/uploads/' + ${#strings.replace(img.fileName, '.jpg', '.webp')}}"
                                type="image/webp">
                        <img th:src="@{'/uploads/' + ${img.fileName}}"
                             th:alt="${slide.title}"
                             th:attr="loading=${slideStat.first and imgStat.first} ? 'eager' : 'lazy',
                                      decoding='async',
                                      fetchpriority=${slideStat.first and imgStat.first} ? 'high' : 'auto'">
                    </picture>
                </div>
                <div class="slide-description"
                     th:if="${slide.description}"
                     th:utext="${@markdownService.toHtml(slide.description)}">説明</div>
            </section>
        </th:block>
    </div>
</main>

<footer th:replace="~{layout/fragments :: footer}"></footer>

</body>
</html>
